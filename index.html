<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wird — Mentions légales</title>
<style>
  :root{
    --bg:#F7F3EA; --surface:#FFFDF8; --ink:#33302A; --muted:#6E685E;
    --sage:#5F7562; --sage-deep:#4C6050; --gold:#B08D3F; --line:#E6DECF;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);min-height:100vh;display:flex;
    align-items:center;justify-content:center;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:18px;
    padding:44px 40px;max-width:440px;width:calc(100% - 40px);text-align:center;}
  .brand{display:inline-flex;align-items:center;gap:9px;margin:0 0 22px;color:var(--sage-deep);
    font-weight:600;letter-spacing:.05em;text-transform:uppercase;font-size:14px;}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--gold);}
  h1{color:var(--sage-deep);font-size:26px;margin:0 0 8px;}
  p{color:var(--muted);font-size:16px;line-height:1.6;margin:0 0 28px;}
  a.link{display:block;padding:15px 18px;margin:10px 0;border:1px solid var(--line);border-radius:12px;
    color:var(--sage-deep);text-decoration:none;font-weight:600;background:#fff;transition:.15s;}
  a.link:hover{border-color:var(--gold);color:var(--gold);}
</style>
</head>
<body>
  <div class="card">
    <div class="brand"><span class="dot"></span>Wird</div>
    <h1>Mentions légales</h1>
    <p>Documents relatifs à l'application Wird.</p>
    <a class="link" href="confidentialite.html">Politique de confidentialité</a>
    <a class="link" href="conditions.html">Conditions générales d'utilisation</a>
  </div>
</body>
</html>
